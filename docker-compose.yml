version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: agency
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://user:pass@db:5432/agency
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A app.worker.celery_app worker -l info -Q fb-queue,ig-queue,li-queue
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+psycopg2://user:pass@db:5432/agency
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db

  beat:
    build: .
    command: celery -A app.worker.celery_app beat -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+psycopg2://user:pass@db:5432/agency
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - worker

volumes:
  pgdata: